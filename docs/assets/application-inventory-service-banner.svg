<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Application Inventory Service</title>
  <desc id="desc">A blue technical banner showing application inventory flowing from source platforms into reports, databases, and security scanners.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06142f"/>
      <stop offset="0.55" stop-color="#0b3b78"/>
      <stop offset="1" stop-color="#0f75bc"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#00112e" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="32" fill="url(#bg)"/>
