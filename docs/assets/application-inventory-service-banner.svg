    <rect x="475" y="70" width="250" height="210" rx="20" fill="url(#card)" stroke="#bfdbfe" stroke-opacity="0.35"/>
    <rect x="880" y="70" width="250" height="210" rx="20" fill="url(#card)" stroke="#bfdbfe" stroke-opacity="0.35"/>
  </g>
  <g fill="none" stroke="#dbeafe" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path d="M260 145 H475"/>
    <path d="M725 145 H940"/>
    <path d="M260 205 H475"/>
    <path d="M725 205 H940"/>
    <path d="M452 133 L475 145 L452 157"/>
    <path d="M452 193 L475 205 L452 217"/>
    <path d="M917 133 L940 145 L917 157"/>
    <path d="M917 193 L940 205 L917 217"/>
