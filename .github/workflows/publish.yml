name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: github.repository == 'InfoSec-Actions/application-inventory-service'
    environment:
      name: pypi
      url: https://pypi.org/project/application-inventory-service/
    permissions:
      contents: read
      id-token: write
    env:
      APPLICATION_INVENTORY_TEST_POSTGRES_DSN: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tooling
        run: python -m pip install build twine

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Build distribution
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  dockerhub:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    if: github.repository == 'InfoSec-Actions/application-inventory-service'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY || 'h0p3sf4ll/application-inventory-service' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip when Docker Hub credentials are not configured
        if: env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == ''
        run: echo "Docker Hub credentials are not configured; skipping Docker Hub publish."

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        run: echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build and push Docker image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker build \
            -t "$DOCKERHUB_REPOSITORY:$VERSION" \
            -t "$DOCKERHUB_REPOSITORY:latest" \
            .
          docker push "$DOCKERHUB_REPOSITORY:$VERSION"
          docker push "$DOCKERHUB_REPOSITORY:latest"
